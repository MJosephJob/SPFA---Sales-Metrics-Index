<script>
/* ===========================
   0. TIMER
   =========================== */
let startTime;
let timerInterval;

function startTimer() {
  startTime = performance.now();
  timerInterval = setInterval(() => {
    const elapsedMs = performance.now() - startTime;
    const seconds = Math.floor(elapsedMs / 1000);
    const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
    const secs = String(seconds % 60).padStart(2, '0');
    document.getElementById('timerText').textContent = mins + ':' + secs;
  }, 1000);
}

/* PAGES: which questions on which screen */
const pages = [
  { likertIds: ['Q1','Q2','Q3','Q4','Q5','Q6','Q7','Q8','Q9','Q10'], forced: [] },
  { likertIds: ['Q11','Q12','Q13','Q14','Q15','Q16','Q17','Q18','Q19','Q20'], forced: [] },

let currentPage = 0;

/* ===========================
   2. RENDER CURRENT PAGE
   =========================== */

function renderCurrentPage() {
  const container = document.getElementById('questionsContainer');
  const form = document.getElementById('spfaForm');
  const formData = new FormData(form);
  container.innerHTML = '';
  const page = pages[currentPage];

  // Render Likert questions for this page
  page.likertIds.forEach(id => {
    const q = likertQuestions.find(x => x.id === id);
    if (!q) return;
    const div = document.createElement('div');
    div.className = 'question-block';

    // Likert labels (1–5) with text
    const labels = [
      'Strongly Disagree',
      'Disagree',
      'Neutral',
      'Agree',
      'Strongly Agree'
    ];

    let optionsHtml = '';
    for (let val = 1; val <= 5; val++) {
      optionsHtml += `
        <div class="likert-option">
          <input type="radio" id="${q.id}_${val}" name="${q.id}" value="${val}">
          <label for="${q.id}_${val}">${labels[val-1]}</label>
        </div>
      `;
    }

    div.innerHTML = `
      <div class="question-text"><strong>${q.id}.</strong> ${q.text}</div>
      <div class="likert-scale">
        ${optionsHtml}
      </div>
    `;
    container.appendChild(div);

    // Restore previous selection if any
    const prevVal = formData.get(q.id);
    if (prevVal) {
      const input = container.querySelector(`input[name="${q.id}"][value="${prevVal}"]`);
      if (input) input.checked = true;
    }
  });

  // Render forced-ranking items (only on last page)
  if (page.forced.length > 0) {
    for (let block of forcedBlocks) {
      const blockDiv = document.createElement('div');
      blockDiv.className = 'question-block';
      blockDiv.innerHTML = `
        <div class="ranking-note">
          Rank 1 = Most like me, 4 = Least like me. Please select a rank for every statement.
        </div>
      `;
      block.items.forEach(item => {
        const qDiv = document.createElement('div');
        qDiv.style.marginTop = '6px';
        qDiv.innerHTML = `
          <div class="question-text">${item.id}. ${item.text}</div>
          <select name="${item.id}">
            <option value="">Rank…</option>
            <option value="1">1 (Most like me)</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4 (Least like me)</option>
          </select>
        `;
        blockDiv.appendChild(qDiv);

        // Restore previous rank if any
        const prevRank = formData.get(item.id);
        if (prevRank) {
          const select = blockDiv.querySelector(`select[name="${item.id}"]`);
          if (select) select.value = prevRank;
        }
      });
      container.appendChild(blockDiv);
    }
  }

  // Buttons visibility
  document.getElementById('prevBtn').style.display = currentPage === 0 ? 'none' : 'inline-block';
  document.getElementById('nextBtn').style.display = currentPage === pages.length - 1 ? 'none' : 'inline-block';
  document.getElementById('submitBtn').style.display = currentPage === pages.length - 1 ? 'inline-block' : 'none';

  document.getElementById('error').textContent = '';

  // Update progress bar (simple: page-based)
  const totalPages = pages.length;
  const progress = ((currentPage + 1) / totalPages) * 100;
  const bar = document.getElementById('progressBar');
  if (bar) bar.style.width = progress + '%';
}

/* Validate only current page before moving on */
function validateCurrentPage() {
  const form = document.getElementById('spfaForm');
  const formData = new FormData(form);
  const page = pages[currentPage];

  // Likert on this page
  for (let id of page.likertIds) {
    if (!formData.get(id)) {
      return 'Please answer all questions on this page before continuing.';
    }
  }

  // For forced-ranking page, full validation happens at final submit.
  return '';
}

/* ===========================
   3. SCORING
   =========================== */

function scoreLikert(formData) {
  const traitScores = {};
  const allRaw = [];

  likertQuestions.forEach(q => {
    const raw = parseInt(formData.get(q.id), 10);
    if (isNaN(raw)) return;
    allRaw.push(raw);
    const score = q.reverse ? (6 - raw) : raw;
    traitScores[q.trait] = (traitScores[q.trait] || 0) + score;
  });

  const traitNorm = {};
  Object.keys(traitScores).forEach(tr => {
    traitNorm[tr] = Math.round((traitScores[tr] / traitMax[tr]) * 100);
  });

  return { traitScores, traitNorm, allRaw };
}

function scoreForced(formData) {
  const forcedPoints = { Hunter:0, Farmer:0, Analyzer:0, Support:0 };

  for (let block of forcedBlocks) {
    for (let item of block.items) {
      const rankVal = formData.get(item.id);
      if (!rankVal) throw new Error('Please complete all rankings.');
      const rank = parseInt(rankVal, 10);
      const pts = 5 - rank; // 1->4, 2->3, 3->2, 4->1
      forcedPoints[item.bucket] += pts;
    }
  }

  const forcedNorm = {};
  Object.keys(forcedPoints).forEach(bucket => {
    forcedNorm[bucket] = Math.round((forcedPoints[bucket] / 16) * 100); // 4 blocks * 4 max
  });

  return { forcedPoints, forcedNorm };
}

function computeBuckets(traitNorm, forcedNorm) {
  const Drive = traitNorm.Drive || 0;
  const Competitive = traitNorm.Competitive || 0;
  const Resilience = traitNorm.Resilience || 0;
  const Relationship = traitNorm.Relationship || 0;
  const Analytical = traitNorm.Analytical || 0;
  const Coachability = traitNorm.Coachability || 0;
  const Conscientious = traitNorm.Conscientious || 0;

  const HunterIndex =
    (Drive * 0.25) +
    (Competitive * 0.25) +
    (Resilience * 0.20) +
    (Conscientious * 0.10) +
    ((forcedNorm.Hunter || 0) * 0.20);

  const FarmerIndex =
    (Relationship * 0.30) +
    (Conscientious * 0.20) +
    (Resilience * 0.15) +
    (Coachability * 0.10) +
    ((forcedNorm.Farmer || 0) * 0.25);

  const AnalyzerIndex =
    (Analytical * 0.35) +
    (Conscientious * 0.20) +
    (Resilience * 0.10) +
    (Coachability * 0.10) +
    ((forcedNorm.Analyzer || 0) * 0.25);

  const SupportIndex =
    (Conscientious * 0.35) +
    (Relationship * 0.20) +
    (Analytical * 0.15) +
    (Resilience * 0.05) +
    ((forcedNorm.Support || 0) * 0.25);

  const EnablerIndex =
    (Relationship * 0.30) +
    (Coachability * 0.20) +
    (Analytical * 0.15) +
    (Drive * 0.10) +
    ((forcedNorm.Farmer || 0) * 0.10) +
    ((forcedNorm.Analyzer || 0) * 0.15);

  const buckets = {
    Hunter: Math.round(HunterIndex),
    Farmer: Math.round(FarmerIndex),
    Analyzer: Math.round(AnalyzerIndex),
    Support: Math.round(SupportIndex),
    Enabler: Math.round(EnablerIndex)
  };

  const sorted = Object.entries(buckets).sort((a,b) => b[1] - a[1]);
  return { buckets, primary: sorted[0], secondary: sorted[1], sorted };
}

function computeIMandConsistency(allRaw) {
  const n = allRaw.length;
  const mean = allRaw.reduce((a,b)=>a+b,0) / n;
  const variance = allRaw.reduce((a,b)=>a + Math.pow(b-mean,2),0) / n;
  const sd = Math.sqrt(variance);
  const share5 = allRaw.filter(v => v === 5).length / n;

  let imFlag = '';
  if (share5 > 0.8 || sd < 0.5) {
    imFlag = 'Profile reflects elevated self-consistency. Interpret results alongside interview validation.';
  }
  const consistencyIndex = Math.round((1 - Math.min(sd / 2, 1)) * 100);

  return { imFlag, consistencyIndex, sd, share5 };
}

function renderReport(traitNorm, bucketsInfo, imInfo, elapsedMinutes) {
  const { sorted, primary, secondary } = bucketsInfo;
  const resultDiv = document.getElementById('result');
  resultDiv.style.display = 'block';

  const primaryKey = primary[0];
  const secondaryKey = secondary[0];
  const primaryDesc = bucketDescriptions[primaryKey];
  const secondaryDesc = bucketDescriptions[secondaryKey];

  `;

  resultDiv.innerHTML = `
    <h2>SPFA Profile Summary</h2>

    <p><strong>Primary Pattern:</strong> ${primaryDesc.title} (${primary[1]})</p>
    <p>${primaryDesc.summary}</p>

    <h3>Primary Strengths</h3>
    <ul>
      ${primaryDesc.strengths.map(s => `<li>${s}</li>`).join('')}
    </ul>

    <ul>

    </ul>

    <p><strong>Recommended Role Fit:</strong> ${primaryDesc.usage}</p>
    <p><strong>Ideal Environment:</strong> ${primaryDesc.environment}</p>

    <h3>Secondary Style: ${secondaryDesc.title} (${secondary[1]})</h3>
    <p>${secondaryDesc.summary}</p>

    ${imInfo.imFlag ? `<p><em>${imInfo.imFlag}</em></p>` : ''}

    <p><small>Completion time: ${elapsedMinutes.toFixed(1)} minutes.</small></p>

    <details id="technicalDetails" style="margin-top:12px;" open>
  <summary>View technical details (scores)</summary>
  ${technicalHtml}
</details>

    <button id="downloadPdf">Download PDF</button>
  `;

document.getElementById('downloadPdf').addEventListener('click', () => {
  const name = document.getElementById('name').value || 'Anonymous';
  const safeName = name.replace(/[^a-z0-9\- ]/gi, '').trim() || 'Anonymous';

  const element = document.getElementById('result');

  const opt = {
    margin:       10,
    filename:     'SPFA-Report for ' + safeName + '.pdf',
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, useCORS: true },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak:    { mode: ['css', 'legacy'] }
  };

  html2pdf().set(opt).from(element).save();
});
}

/* ===========================
   5. GOOGLE SHEETS LOGGING (DISABLED)
   =========================== */

const SHEETS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbw8KRhnxKtGGndNDnBmPjlQCnaWkzprf_-yiP-RqXZdA3USPctLwfPCZ9W_CxDmHfC5NQ/exec';

function sendToSheets(traitNorm, bucketsInfo, imInfo, elapsedMinutes) {
  if (!SHEETS_WEBAPP_URL) return;
  
  const name = document.getElementById('name').value || 'Anonymous';
  const email = document.getElementById('email').value || '';
  
  const payload = {
    name: name,
    email: email,
    traits: traitNorm,
    buckets: bucketsInfo.buckets,
    primaryBucket: bucketsInfo.primary[0],
    secondaryBucket: bucketsInfo.secondary[0],
    imFlag: imInfo.imFlag,
    consistencyIndex: imInfo.consistencyIndex,
    elapsedMinutes: elapsedMinutes
  };
  
  console.log('Sending to Sheets:', payload); // DEBUG

  fetch(SHEETS_WEBAPP_URL, {
    method: 'POST',
    body: JSON.stringify(payload),
    headers: { 'Content-Type': 'application/json' }
  })
  .then(res => res.json())
  .then(data => console.log('Logged to sheet:', data))
  .catch(err => console.error('Sheet logging failed:', err));
}

/* ===========================
   6. NAV + SUBMIT
   =========================== */

function handleNext() {
  const errorDiv = document.getElementById('error');
  const msg = validateCurrentPage();
  if (msg) {
    errorDiv.textContent = msg;
    return;
  }
  if (currentPage < pages.length - 1) {
    currentPage++;
    renderCurrentPage();
  }
}

function handlePrev() {
  if (currentPage > 0) {
    currentPage--;
    renderCurrentPage();
  }
}

function handleSubmit() {
  clearInterval(timerInterval);
  const form = document.getElementById('spfaForm');
  const errorDiv = document.getElementById('error');
  errorDiv.textContent = '';

  const formData = new FormData(form);

  let likertResult, forcedResult;
  try {
    likertResult = scoreLikert(formData);
    forcedResult = scoreForced(formData);
  } catch (e) {
    errorDiv.textContent = e.message;
    return;
  }

  const elapsedMinutes = (performance.now() - startTime) / 60000;
  const bucketsInfo = computeBuckets(likertResult.traitNorm, forcedResult.forcedNorm);
  const imInfo = computeIMandConsistency(likertResult.allRaw);

  document.getElementById('spfaForm').style.display = 'none';
  renderReport(likertResult.traitNorm, bucketsInfo, imInfo, elapsedMinutes);
  sendToSheets(likertResult.traitNorm, bucketsInfo, imInfo, elapsedMinutes);
}

/* ===========================
   7. INIT
   =========================== */

window.addEventListener('load', () => {
  renderCurrentPage();
  startTimer();
  document.getElementById('prevBtn').addEventListener('click', handlePrev);
  document.getElementById('nextBtn').addEventListener('click', handleNext);
  document.getElementById('submitBtn').addEventListener('click', handleSubmit);
});
</script>
</body>
</html>
